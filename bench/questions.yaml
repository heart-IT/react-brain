# ══════════════════════════════════════════════════════════════
# react-brain STALENESS BENCHMARK — question bank
# ══════════════════════════════════════════════════════════════
# Every question derives from a VERIFIED, DATED fact in the corpus (entry: names
# the source entry; verified: the fact-check date). Grading is deterministic:
#   fresh_markers  — case-insensitive regexes; any match ⇒ the answer knows the
#                    current truth (fresh WINS over stale when both match, since
#                    good answers often mention the superseded thing by name).
#   stale_markers  — any match (and no fresh match) ⇒ the answer asserts the
#                    outdated state of the world.
#   neither        ⇒ unclear (scored separately, not as stale).
# A global hedge detector (knowledge cutoff / "verify the latest" / "as of …")
# separates honest uncertainty from CONFIDENT staleness — the headline metric.
# Questions are phrased factually so a regex rubric is fair; no judge model.
# ══════════════════════════════════════════════════════════════
questions:
  - id: expo-e2e
    entry: RB-E-TESTING
    verified: 2026-07-01
    question: "Which end-to-end testing tool does Expo recommend for React Native apps, Detox or Maestro?"
    answer: "Maestro — Expo archived its Detox support and recommends Maestro."
    fresh_markers: ["maestro"]
    stale_markers: ["detox"]

