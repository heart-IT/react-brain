# Deploy the site to GitHub Pages on every main push. The site is a build-time
# rendering of the corpus YAML, so every harvest/graduation commit auto-redeploys
# it — /census, /scorecard, and the entry pages are always exactly as fresh as
# the corpus. Live at: https://heart-it.github.io/react-brain/
# (base-path build verified 2026-07-06; all links go through href(BASE_URL))
name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        # Pages source = "GitHub Actions", enabled once in repo Settings (2026-07-10).
        # enablement:true was tried and rejected — the workflow token can't administer
        # Pages; creation is a one-time human toggle.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
        env:
          ASTRO_BASE: /react-brain/   # `npm run build -- --base` would hit pagefind, not astro
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
