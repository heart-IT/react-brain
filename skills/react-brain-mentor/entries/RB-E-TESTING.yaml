id: RB-E-TESTING
topic: "Testing strategy & tooling"
category: testing
group: tooling-ops
status: reviewed   # long-form entry written + source-checked → encyclopedia/RB-E-TESTING.md
confidence: high
platforms: [react, react-native]
options:
  - { name: "Jest / Vitest", tradeoff: "unit; Vitest faster on web, Jest default on RN" }
  - { name: "React Testing Library (14)", tradeoff: "behavior-first component tests (web + RN variants); v14 adds React 19 support + async APIs" }
  - { name: "MSW (Mock Service Worker)", tradeoff: "network-level API mocking; same mocks reused across unit/e2e and dev" }
  - { name: "Playwright / Maestro / Detox / Meticulous", tradeoff: "e2e: Playwright web; Maestro 2.0 (AI test-healing) is Expo's recommended native e2e (Expo archived Detox; Detox has a 'Copilot' beta); Maestro now bundles an MCP server so coding agents can drive simulators/emulators/devices, inspect UI, and generate E2E flows (claude mcp add maestro -- maestro mcp); Meticulous = record-based AI e2e" }
  - { name: "Storybook 10", tradeoff: "component workshop; web + RN run side-by-side; Vite 8 + Playwright/Vitest test integration + MCP" }
  - { name: "Radon IDE (Software Mansion)", tradeoff: "VS Code / Cursor RN debugging — device panel, click-to-inspect, React Profiler" }
  - { name: "Argent (Software Mansion) — NEW/experimental", tradeoff: "agentic toolkit giving an AI assistant control of the iOS Simulator (drive + inspect the running app) to shorten the debug loop; new, niche" }
  - { name: "react-native-harness (Callstack) — NEW", tradeoff: "Jest-style describe/it tests running ON real devices/simulators (iOS/Android/web) with native-module access — the on-device unit/integration layer between Node-Jest and black-box Maestro; v1.3 (2026-05), early" }
recommend:
  default: "Unit/component: Vitest (web) or Jest (RN) + React Testing Library. E2E: Playwright (web), Maestro (RN). MSW for API mocks; Storybook for component dev."
  when:
    - "RN e2e → Maestro (Expo's recommendation; it archived Detox)"
    - "API-heavy tests → MSW so the same mocks serve unit + e2e + dev"
    - "Holepunch / Bare app → brittle (the ecosystem's TAP runner) is idiomatic, not a deviation — see RB-E-P2P"
    - "unit/integration tests that must exercise real NATIVE modules → react-native-harness (early; pin versions)"
    - "test discipline (what to test, TDD) → agentic-engineering-patterns"
note: >
  RN 0.85 (2026-04-07) moved the Jest preset out of the core package — set
  `preset: '@react-native/jest-preset'` in jest.config.js (was `preset: 'react-native'`).
  For native e2e, Expo now recommends Maestro (it archived its Detox support docs). Maestro's
  MCP server (verified vs docs.maestro.dev, 2026-07-07) puts device-driving + E2E-generation in
  the hands of coding agents — the agent-driven-testing trend consolidating around the tool the
  ecosystem already recommends. Jest-preset fact verified against the official RN 0.85 release blog.
  RENDERER FLIP (2026-07-10, verified vs the docs + the mdjastrzebski/test-renderer repo):
  RN Testing Library v14 (actively maintained) runs on its own react-reconciler-based
  test-renderer that renders HOST elements only — which is WHY its query model moved to
  host-element/role queries. The old react-test-renderer package from React core is
  deprecated — don't reach for it in new test code.
defer_to_skill: agentic-engineering-patterns  # TDD/verify discipline
doc: "RB-E-TESTING.md"   # long-form Explanation entry in content_dir
updated: 2026-07-10
reading:
  - title: "Test IDs are an a11y smell"
    url: "https://tkdodo.eu/blog/test-ids-are-an-a11y-smell"
    by: "Dominik Dorfmeister (TkDodo)"
    what: "The bridge between this entry and RB-E-A11Y: querying by data-testid silently hides inaccessible markup, while role/label queries fail exactly when a real assistive-tech user would — so accessible queries are both the better test AND a free a11y audit. Sharpens the Testing-Library philosophy the two Dodds pieces establish."
    claim: "You ship Testing Library — query by role/label, not data-testid: accessible queries are both the stronger test and a free a11y audit; testid queries silently hide inaccessible markup."
    applies_when: { deps: ["@testing-library/*"] }
  - title: "Write tests. Not too many. Mostly integration."
    url: "https://kentcdodds.com/blog/write-tests"
    by: "Kent C. Dodds"
    what: "The foundational testing-strategy essay: maximize confidence per effort by favoring integration tests over mock-heavy unit suites and coverage-chasing. The origin of the Testing-Trophy mindset."
    claim: "You have a test runner — spend it on integration tests over mock-heavy unit suites: confidence per effort is the metric, not coverage."
    applies_when: { deps: ["jest", "vitest"] }
  - title: "Testing Implementation Details"
    url: "https://kentcdodds.com/blog/testing-implementation-details"
    by: "Kent C. Dodds"
    what: "Why tests coupled to internals are brittle (false failures on refactor, false passes on breakage) and why to test behavior the way users use it. The mental model behind Testing Library."
sources:
  - "https://reactnative.dev/blog/2026/04/07/react-native-0.85"
  - "https://docs.maestro.dev/get-started/maestro-mcp"
  - "https://github.com/callstackincubator/react-native-harness"
  - "https://github.com/mdjastrzebski/test-renderer"
migrate:   # installed dep → sequenced upgrade knowledge (assembled by `react-brain migrate`)
  - from: { pkg: "react-test-renderer" }
    to: "React Native Testing Library v14 (host-element role/label queries)"
    urgency: deprecated
    effort: M
    why: "react-test-renderer is deprecated by React core; RNTL v14 runs its own react-reconciler-based test renderer rendering host elements only — don't reach for react-test-renderer in new test code"
    receipts: ["https://github.com/mdjastrzebski/test-renderer"]
