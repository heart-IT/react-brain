updated: 2026-07-09
reading:
  - title: "Rust Is Eating JavaScript"
    url: "https://leerob.com/rust"
    by: "Lee Robinson"
    what: "The first-principles explainer for WHY the JS toolchain is going Rust — memory safety, no GC, real parallelism, the redundant-parsing problem — mapping the whole landscape (esbuild, SWC, Oxc/Biome, Rspack, Rolldown). Durable cross-cutting context, not a single release."
  - title: "Vite 8.0 is out!"
    url: "https://vite.dev/blog/announcing-vite8"
    by: "The Vite / VoidZero team"
    what: "Why maintaining two pipelines (esbuild + Rollup) was unsustainable and how Rolldown unifies dev/prod on one Rust bundler (10-30x faster), with Oxc semantic analysis driving better tree-shaking. The primary source for the Vite+Rolldown+Oxc consolidation."
  - title: "Exploring Inlined Requires: how they really work"
    url: "https://andrei-calazans.com/posts/2026-06-02-how-metro-inlined-requires-work/"
    by: "Andrei Calazans"
    what: "Exactly what Metro's inlineRequires Babel transform does, why React/RN stay hoisted, why default imports aren't inlined, and how rnx-kit's esbuild path differs (real tree-shaking vs startup-only). The canonical Metro startup-mechanics reference."
  - title: "The Complete Guide to React Native Build Optimization"
    url: "https://themythicalengineer.com/the-complete-guide-to-react-native-build-optimization.html"
    by: "The Mythical Engineer"
    what: "Why RN Android builds are slow (conservative Gradle/Metro/C++ defaults) and how parallel Gradle, dynamic Metro workers, ccache, and single-architecture builds cut times from 20+ min to 2-5 min, with benchmarks. The RN-CI build-perf dimension the other readings here don't cover."
