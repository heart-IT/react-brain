reading:
  - title: "How Expensify Uses Agent-Device for Mobile Bug Evidence and Profiling"
    url: "https://www.callstack.com/blog/how-expensify-uses-agent-device-for-mobile-bug-evidence-and-profiling"
    by: "Callstack (with Expensify)"
    what: "The first named production-adopter case study for agent-device: agents run Sentry-span measurement loops across branches and drive the React profiler mid-session via react-devtools integration, returning named components and render counts as bug evidence. What agent-in-the-debug-loop looks like at a real company, beyond vendor demos."
  - title: "Meet Argent: Agentic Toolkit to Control, Debug and Profile iOS applications"
    url: "https://swmansion.com/blog/argent-agentic-toolkit-to-control-debug-and-profile-ios-applications/"
    by: "Kacper Kapuściak (Software Mansion)"
    what: "The clearest articulation of the closed loop this entry is about: the agent that writes the code also boots the simulator, drives the UI, attaches a debugger, and profiles React+iOS in the same session — with production numbers (~50% re-render reduction in a banking app) rather than demos."
