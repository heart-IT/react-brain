id: RB-E-LISTS
topic: "Lists & virtualization"
category: lists-and-perf
group: ui
status: reviewed   # long-form entry written + source-checked → encyclopedia/RB-E-LISTS.md
confidence: high
platforms: [react, react-native]
options:
  - { name: "ScrollView/.map", tradeoff: "fine <20 static items only" }
  - { name: "FlatList", tradeoff: "RN baseline virtualization" }
  - { name: "FlashList", tradeoff: "recycling; large RN lists (v2 = New Architecture ONLY; old arch → pin v1.x)" }
  - { name: "react-window / react-virtual / HighTable", tradeoff: "web virtualization; HighTable handles billion-row tables (viewport-only DOM + scrollbar downscaling)" }
  - { name: "Legend List", tradeoff: "one virtualization engine for RN + web (v3.0 stable); SectionList + chat/anchoring APIs; signal-driven container pool → very small re-renders" }
recommend:
  default: "RN: FlashList for large lists, FlatList otherwise, ScrollView only for <20 static items. Web: react-virtual / react-window."
  when:
    - "huge web tables (100k+ rows) → HighTable"
    - "one list engine across RN + web → Legend List"
    - "old-architecture RN app → FlashList v2 is New-Arch-only; pin FlashList v1.x or stay on FlatList"
    - "exact thresholds / perf → react-native-best-practices owns the rules"
defer_to_skill: react-native-best-practices  # RN-RULE-USE-FLASHLIST owns the thresholds
doc: "RB-E-LISTS.md"   # long-form Explanation entry in content_dir
updated: 2026-07-10   # challenge-pass caveat: FlashList v2 = New-Arch-only (verified vs the Shopify README)
reading:
  - title: "How to Build the Fastest Apps: Break the Rules (App.js Conf 2026)"
    url: "https://www.youtube.com/watch?v=K3flMIHS-cI"
    by: "Jay Meistrich — author of Legend List"
    what: "Why Legend List is fast, from its author: it mounts a fixed pool of absolutely-positioned containers once and never re-renders that array again — instead it *signals* individual containers to re-render themselves at a new position/item as you scroll, and turns frequent size changes into animated-style updates rather than list re-renders. The generalizable lesson ('render once'): keep each render tiny by pushing it to the leaf that actually changed. Complements the peterp.me engine walkthrough with the same-source mechanism; announces v3.0 stable (RN + web). Vendor talk."
    claim: "You ship Legend List — it mounts a fixed pool of absolutely-positioned containers once and signals individual containers to re-render at new positions, so scrolling never re-renders the list array (v3.0 stable covers RN + web; vendor talk)."
    applies_when: { deps: ["@legendapp/list"] }
  - title: "FlashList v2: a ground-up rewrite for React Native's New Architecture"
    url: "https://shopify.engineering/flashlist-v2"
    by: "Talha Naqvi (Shopify Engineering)"
    what: "The maintainer's architecture deep-dive on FlashList's New-Architecture rewrite — view recycling, progressive rendering, layout prediction, and pre-paint correction via synchronous measurement — explaining the recycling machinery from first principles, not just the API."
    claim: "You ship FlashList — v2 is New-Architecture-ONLY (old arch → pin v1.x), and the v2 rewrite changes the recycling machinery (progressive rendering, pre-paint correction)."
    applies_when: { deps: ["@shopify/flash-list"], platforms: [react-native] }
  - title: "React windowing vs. component recycling"
    url: "https://blog.logrocket.com/react-performance-optimization-windowing-vs-component-recycling/"
    by: "Iskander Samatov (LogRocket)"
    what: "Cleanly separates the two long-list strategies — windowing (render only the viewport, mount/unmount on scroll) vs recycling (reuse nodes by reassigning keys) — and when to escalate. Bridges web (react-window) and RN (FlashList)."
  - title: "What's actually happening inside Legend List"
    url: "https://www.peterp.me/articles/legend-list-engine-simulator/"
    by: "Peter Piekarczyk"
    what: "Explains Legend List's virtualization formula — estimated item size, draw distance, container-pool ratio, asymmetric 1.5x/0.5x buffering. A concrete mental model for list recycling performance (complements the FlashList piece)."
    claim: "You ship Legend List — its tuning surface is the virtualization formula: estimated item size, draw distance, container-pool ratio, and asymmetric 1.5x/0.5x buffering."
    applies_when: { deps: ["@legendapp/list"] }
  - title: "Virtual scrolling for billions of rows (techniques from HighTable)"
    url: "https://rednegra.net/blog/20260212-virtual-scroll/"
    by: "Sylvain Lesage"
    what: "The five techniques behind HighTable — lazy slicing, the ~17M-px canvas-height ceiling with downscaled scrollbars, dual local/global scroll modes, decoupled axes. The web huge-table counterpart to the RN list pieces above (HighTable is a listed option here)."
    claim: "You ship TanStack Table — for huge web tables (100k+ rows) HighTable's techniques apply: lazy slicing, the ~17M-px canvas-height ceiling with downscaled scrollbars, dual local/global scroll modes, decoupled axes."
    applies_when: { deps: ["@tanstack/react-table"], platforms: [react] }
sources:
  - "https://shopify.engineering/flashlist-v2"
  - "https://rednegra.net/blog/20260212-virtual-scroll/"
detect:   # package.json dep → this entry (pkg: exact | @scope/* | name*; token matched against recommend text)
  - { pkg: "@shopify/flash-list", label: "FlashList", token: "flashlist" }
  - { pkg: "@legendapp/list", label: "Legend List", token: "legend list" }
  - { pkg: "react-window", label: "react-window", token: "react-window" }
  - { pkg: "@tanstack/react-virtual", label: "TanStack Virtual", token: "react-virtual" }
  - { pkg: "@tanstack/react-table", label: "TanStack Table", token: "hightable" }
detect_source:   # source-level signals owned by this entry (regex over repo source)
  # horizontal ScrollViews are excluded: a bounded pill/chip bar is the LEGITIMATE
  # ScrollView case (ourpot dogfood 2026-07-13: all 4 Search.tsx flags were horizontal
  # filter bars while the results list was already on FlatList — pure false positives)
  - pattern: "<ScrollView(?![^>]*\\bhorizontal\\b)[\\s\\S]{0,600}?\\.map\\("
    signal: "vertical ScrollView rendering a mapped array — virtualization likely bypassed"
    hint: "list cost scales with MOUNTED NODES, not data length — FlatList/FlashList for growing lists; bounded <20-item option lists are fine (thresholds → react-native-best-practices)"
migrate:   # installed dep → sequenced upgrade knowledge (assembled by `react-brain migrate`)
  - from: { pkg: "@shopify/flash-list", below: "2.0.0" }
    to: "FlashList v2"
    urgency: upgrade
    effort: M
    requires: { pkg: "react-native", atleast: "0.82.0" }
    why: "v2 is a ground-up New-Architecture rewrite (recycling, progressive rendering, pre-paint correction) and is New-Arch-ONLY — on the old architecture stay pinned to v1.x until the RN ladder is done"
    receipts: ["https://shopify.engineering/flashlist-v2"]
