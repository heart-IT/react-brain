  - { pkg: "@super-calendar/*", label: "Super Calendar", token: "super-calendar" }
  - { pkg: "react-native-calendar-strip", label: "calendar-strip", token: "calendar-strip" }
  - { pkg: "react-big-calendar", label: "react-big-calendar", token: "react-big-calendar" }
