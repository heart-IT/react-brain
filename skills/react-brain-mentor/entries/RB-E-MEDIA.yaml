  - { pkg: "react-native-vision-camera", label: "VisionCamera", token: "visioncamera" }
  - { pkg: "expo-camera", label: "expo-camera", token: "expo-camera" }
  - { pkg: "@livekit/*", label: "LiveKit", token: "livekit" }
  - { pkg: "react-native-webrtc", label: "react-native-webrtc", token: "webrtc" }
  - { pkg: "expo-av", label: "expo-av (DEPRECATED → expo-video/expo-audio)", token: "expo-av" }
  - { pkg: "expo-video", label: "expo-video (playback)", token: "expo-video" }
  - { pkg: "react-native-audio-api", label: "audio-api (Web Audio)", token: "audio-api" }
  - { pkg: "react-native-qrcode-svg", label: "QR generation (qrcode-svg)", token: "scanning" }
  - { pkg: "expo-image-picker", label: "expo-image-picker", token: "camera" }
migrate:   # installed dep → sequenced upgrade knowledge (assembled by `react-brain migrate`)
  - from: { pkg: "expo-av" }
    to: "expo-video (playback) + expo-audio"
    urgency: deprecated
    effort: M
    why: "expo-av is DEPRECATED — removed from Expo Go in SDK 55 and no longer patched; expo-video splits player logic (VideoPlayer) from view (VideoView), expo-audio covers audio playback"
    receipts: ["https://expo.dev/changelog/sdk-55"]
