  - "https://github.com/advisories/GHSA-83fc-fqcc-2hmg"
  - "https://github.com/adnxy/rnsec"
  - "https://vercel.com/kb/bulletin/vercel-april-2026-security-incident"
  - "https://vercel.com/blog/introducing-deepsec-find-and-fix-vulnerabilities-in-your-code-base"
detect:   # package.json dep → this entry (pkg: exact | @scope/* | name*; token matched against recommend text)
  - { pkg: "rnsec", label: "rnsec (security scanner)", token: "rnsec" }
  - { pkg: "jail-monkey", label: "jail-monkey", token: "jail-monkey" }
detect_source:   # source-level signals owned by this entry (regex over repo source)
  - pattern: "AsyncStorage\\.setItem\\(\\s*[`'\"][^`'\"]*(?:token|secret|password|jwt|api[_-]?key)"
    flags: "i"
    signal: "secret-looking values written to AsyncStorage"
    hint: "AsyncStorage is plaintext — tokens/secrets belong in Keychain/Keystore (react-native-keychain / expo-secure-store, see RB-E-STORAGE)"
  - pattern: "dangerouslySetInnerHTML"
    signal: "raw HTML injection surface (dangerouslySetInnerHTML)"
    hint: "sanitize the payload and/or adopt Trusted Types; per-diff injection checks → the review skill"
