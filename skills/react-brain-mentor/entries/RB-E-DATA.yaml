id: RB-E-DATA
topic: "Data fetching & caching"
category: state-and-data
group: app-architecture
status: reviewed   # long-form entry written + source-checked → encyclopedia/RB-E-DATA.md
confidence: high
platforms: [react, react-native]
options:
  - { name: "TanStack Query (5.x)", tradeoff: "cache, retries, invalidation; framework-agnostic" }
  - { name: "SWR", tradeoff: "lighter, hook-first" }
  - { name: "RTK Query", tradeoff: "if already on Redux Toolkit" }
  - { name: "Apollo Client (4.x) / urql / Relay (21)", tradeoff: "GraphQL: Relay v21 adds first-party TS + experimental RSC; Apollo 4.2 type-safe defaults" }
  - { name: "tRPC", tradeoff: "end-to-end type-safe RPC (no schema/codegen) when client + server are both TS; not for public/polyglot APIs" }
  - { name: "TanStack DB / Zero / TinyBase / RSC", tradeoff: "local-first sync/stores (TanStack DB, Zero 1.0, TinyBase 9) and server-fetched RSC are emerging data-layer alternatives; TanStack DB 0.6 (2026-03) added SQLite-backed persistence (browser WASM, RN/Expo, Node, Electron) + offline transactions — real offline now, still 0.x" }
recommend:
  default: "TanStack Query for REST/server-state caching — the default for client-side data fetching."
  when:
    - "GraphQL backend → Apollo Client (or Relay for first-party TS + scale)"
    - "client + server both TypeScript, private API → tRPC (type-safety with no codegen)"
    - "offline / local-first / collaborative → TanStack DB or Zero"
    - "P2P / serverless / Holepunch backend → data lives in the Hypercore/Autobase stack queried locally via hrpc; a client cache (TanStack Query) is N/A by design — see RB-E-P2P"
    - "server-rendered web → fetch in RSC and skip a client cache where you can"
    - "already on Redux Toolkit → RTK Query"
note: "Server state ≠ client state (see RB-E-STATE). TanStack Query is the #1 React library in State of React 2025; it's transport- and platform-agnostic, so the data layer is shared code across web + RN. Adversarially stress-tested 2026-06-25 (SURVIVES, high): RSC complements (doesn't displace) the cache; TanStack DB builds ON TanStack Query; Zero reached 1.0 (2026-06) with React Native support."
defer_to_skill: null
doc: "RB-E-DATA.md"   # long-form Explanation entry in content_dir
updated: 2026-07-10   # TanStack DB 0.6 persistence verified vs npm + tanstack blog; TkDodo readings added
reading:
  - title: "Creating Query Abstractions"
    url: "https://tkdodo.eu/blog/creating-query-abstractions"
    by: "Dominik Dorfmeister (TkDodo), TanStack Query maintainer"
    what: "Maintainer-authored architecture guidance: queryOptions objects (not custom hooks) are THE abstraction layer for queries — composable, framework-portable, and reusable across useQuery/prefetch/suspense call sites. The how-to-structure companion to 'Why You Want React Query'."
    claim: "You ship TanStack Query — the maintainer's guidance is to structure around queryOptions objects, not per-query custom hooks (composable across useQuery/prefetch/suspense)."
    applies_when: { deps: ["@tanstack/react-query"] }
  - title: "TanStack Router and Query"
    url: "https://tkdodo.eu/blog/tan-stack-router-and-query"
    by: "Dominik Dorfmeister (TkDodo)"
    what: "The selection question this entry's TanStack rows raise: Router's cache is per-route, Query's is global — when route-loader caching alone suffices, when you want the full query cache, and how to layer them without double-fetching. Maintainer-authored."
    claim: "You ship TanStack Router — its loader cache is per-route while Query's is global; the maintainer maps when route-loader caching alone suffices and how to layer both without double-fetching."
    applies_when: { deps: ["@tanstack/react-router"] }
  - title: "Why You Want React Query"
    url: "https://tkdodo.eu/blog/why-you-want-react-query"
    by: "Dominik Dorfmeister (TkDodo), TanStack Query maintainer"
    what: "Takes a naive fetch-in-useEffect and exposes the five real bugs it hides (race conditions, missing loading/empty states, stale data+error pairs, StrictMode double-fire), then shows how a server cache fixes them. The durable answer to why-not-just-useEffect."
    claim: "You ship an HTTP client but no server cache — hand-rolled fetching hides race conditions, StrictMode double-fires, and stale error states; a server cache (TanStack Query) fixes the class."
    applies_when: { deps: ["axios", "ky", "ofetch", "graphql-request"], absent_deps: ["@tanstack/react-query", "swr", "@apollo/client", "urql", "@rocicorp/zero", "@trpc/*"] }
  - title: "From latency to instant: modernizing GitHub Issues navigation performance"
    url: "https://github.blog/engineering/architecture-optimization/from-latency-to-instant-modernizing-github-issues-navigation-performance/"
    by: "GitHub Engineering"
    what: "Engineering case study on local-first caching, stale-while-revalidate, service-worker hard-navigation, and preheating vs naive prefetch, with measured percentile gains. Durable client-side data-caching patterns at scale."
  - title: "The Best Loading States Are No Loading States"
    url: "https://jjenzz.com/best-loading-states-are-no-loading-states/"
    by: "Jenna Smith (jjenzz)"
    what: "Argues loading UI belongs at the app/route level (transitions + preload-on-hover/intersection) rather than scattered component spinners, using blank regions as a preload diagnostic. Durable, framework-agnostic data-loading-UX thinking."
  - title: "use(): the hook that breaks the rules (on purpose)"
    url: "https://saschb2b.com/blog/use-hook-react"
    by: "Sascha Becker"
    what: "Deep-dive on the use() hook — unwrapping promises/context at render under Suspense, the promise-identity caching requirement, and why it can legally run conditionally unlike other hooks. The modern data-fetching primitive explained."
  - title: "Real-time cache invalidation (SSE + tRPC + Redis + BullMQ)"
    url: "https://armand-salle.fr/post/real-time-cache-invalidation-sse-trpc-redis-bullmq/"
    by: "Armand Sallé"
    what: "A full architecture for pushing invalidation EVENTS (not data) over SSE to drive TanStack Query cache updates, with reference-counted subscriptions and horizontal-scaling guidance. The real-time dimension the other DATA readings don't cover."
sources:
  - "https://2025.stateofreact.com/en-US/libraries/"
detect:   # package.json dep → this entry (pkg: exact | @scope/* | name*; token matched against recommend text)
  - { pkg: "@tanstack/react-query", label: "TanStack Query", token: "tanstack query" }
  - { pkg: "swr", label: "SWR", token: "swr" }
  - { pkg: "@apollo/client", label: "Apollo Client", token: "apollo" }
  - { pkg: "urql", label: "urql", token: "urql" }
  - { pkg: "@trpc/*", label: "tRPC", token: "trpc" }
  - { pkg: "@rocicorp/zero", label: "Zero", token: "zero" }
  - { pkg: "@tanstack/react-db", label: "TanStack DB", token: "tanstack db" }
detect_source:   # source-level signals owned by this entry (regex over repo source)
  - pattern: "useEffect\\([\\s\\S]{0,300}?\\bfetch\\("
    signal: "fetch-in-useEffect data loading"
    hint: "hides race conditions, StrictMode double-fires, stale error states — a server cache (TanStack Query) fixes the class (see reading: 'Why You Want React Query')"
    unless_dep: "@tanstack/react-query"
