id: RB-E-AI-UI
topic: "Generative UI & in-app AI"
category: ai-ui
group: ai
status: drafted
confidence: low
platforms: [react, react-native]
options:
  - { name: "Vercel AI SDK / json-render", tradeoff: "streaming chat + tool-calling; json-render renders model output as components (now RN too)" }
  - { name: "assistant-ui / Tambo", tradeoff: "prebuilt chat/generative-UI components; Tambo 1.0 adds state persistence + streaming, self-host or cloud" }
  - { name: "Cedar / Streamdown", tradeoff: "Cedar = agent-UI toolkit; Streamdown = streaming-markdown renderer for LLM output" }
  - { name: "TanStack AI (@tanstack/ai + ai-react)", tradeoff: "type-safe TS AI SDK — streaming chat, tool calling, agents, host-side MCP client, generation hooks (useGenerateImage/Speech/Video, useTranscription) beyond chat; 7-provider adapters; pre-1.0 (0.41, active 2026-07) — the first real Vercel-AI-SDK alternative" }
recommend:
  default: "Vercel AI SDK for streaming chat + tool-calling (TanStack AI is the emerging type-safe alternative — pre-1.0, watch it); assistant-ui/Tambo for prebuilt chat UI; Streamdown to render streaming markdown. Very fast-moving (confidence: low) — treat picks as current-best, not settled."
  when:
    - "render model output as live components → json-render"
    - "agent-style UI → Cedar"
    - "already TanStack-stack (Query/Router/Start) or want image/speech/video generation hooks → TanStack AI (pre-1.0, pin)"
note: >
  Distinct from on-device inference (RB-E-ONDEVICE-AI) — this is cloud-LLM app UI. Very
  fast-moving; recommend tentatively (confidence: low). Adjacent: Vercel's Eve is a file-based agent framework (an agent =
  a folder of tools/connections/channels/schedules; MCP connections, human-approval gates,
  sandboxed subagents) — that's the agent BACKEND you'd then surface through these UI libs,
  not a React UI library itself.
defer_to_skill: null
doc: null
updated: 2026-07-20   # Margelo RN chat-stack reading + TanStack AI 0.41 — firsthand watch
sources:
  - "https://json-render.dev/docs/ai-sdk"
  - "https://github.com/tambo-ai/tambo"
  - "https://registry.npmjs.org/@tanstack/ai/latest"
  - "https://tanstack.com/blog/generation-hooks"
reading:
  - title: "Generative User Interfaces — rendering UI with language models"
    url: "https://ai-sdk.dev/docs/advanced/rendering-ui-with-language-models"
    by: "Vercel (AI SDK)"
    what: "The core generative-UI mental model: tools return structured JSON that maps to React component props; the client-side switch-statement scaling problem; and the server-side createStreamableUI/RSC solution for streaming components during generation."
    claim: "You ship the Vercel AI SDK — the generative-UI model: tools return structured JSON mapped to React component props; the client-side switch statement doesn't scale, so stream components during generation via createStreamableUI/RSC."
    applies_when: { deps: ["ai", "@ai-sdk/*"], platforms: [react] }
  - title: "How to Build a Performant AI Markdown Renderer"
    url: "https://tigerabrodi.blog/how-to-build-a-performant-ai-markdown-renderer"
    by: "Tiger Abrodi"
    what: "The architecture behind streaming-markdown rendering (the Streamdown problem): repairing incomplete markdown before parsing, block-level memoization to avoid re-parsing every token, processor caching, and startTransition for smooth streaming."
    claim: "You ship streaming LLM output — render markdown the Streamdown way: repair incomplete markdown before parsing, memoize at block level so every token doesn't re-parse, cache the processor, and wrap updates in startTransition."
    applies_when: { deps: ["ai", "@ai-sdk/*", "@tanstack/ai"] }
  - title: "Building a ChatGPT-Style AI Chat App in React Native with RAG & Streaming"
    url: "https://blog.margelo.com/building-native-llm-chat-app-with-rag"
    by: "Dave Mkpa-Eke (Margelo)"
    what: "A production RN chat-app architecture (MargeloChat): stream OpenAI over WebSocket with UTF-8 decoding off the JS thread (react-native-nitro-websockets), native markdown parsing (Software Mansion's react-native-enriched-markdown), Legend List v3 for the transcript, keyboard-controller for composer tracking, true-sheet + liquid-glass for chrome, Pinecone RAG over nitro-fetch — 57-60fps by keeping every expensive step native or UI-thread. Margelo self-promotes its Nitro ecosystem throughout; the architectural principle stands independent of the vendor picks."
    claim: "You're building an AI chat UI in React Native — keep the JS thread free: decode streaming sockets, parse markdown, and fetch RAG natively; render the transcript with a chat-optimized list. Per-token JS-thread work is what makes streaming chat jank."
    applies_when: { deps: ["ai", "@ai-sdk/*", "@tanstack/ai"], platforms: [react-native] }
detect:   # package.json dep → this entry (pkg: exact | @scope/* | name*; token matched against recommend text)
  - { pkg: "@ai-sdk/*", label: "Vercel AI SDK", token: "ai sdk" }
  - { pkg: "ai", label: "Vercel AI SDK", token: "ai sdk" }
  - { pkg: "@assistant-ui/*", label: "assistant-ui", token: "assistant-ui" }
  - { pkg: "@tanstack/ai", label: "TanStack AI", token: "tanstack ai" }
  - { pkg: "@tanstack/ai-react", label: "TanStack AI (React)", token: "tanstack ai" }
