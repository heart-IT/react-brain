reading:
  - title: "Generative User Interfaces — rendering UI with language models"
    url: "https://ai-sdk.dev/docs/advanced/rendering-ui-with-language-models"
    by: "Vercel (AI SDK)"
    what: "The core generative-UI mental model: tools return structured JSON that maps to React component props; the client-side switch-statement scaling problem; and the server-side createStreamableUI/RSC solution for streaming components during generation."
  - title: "How to Build a Performant AI Markdown Renderer"
    url: "https://tigerabrodi.blog/how-to-build-a-performant-ai-markdown-renderer"
    by: "Tiger Abrodi"
    what: "The architecture behind streaming-markdown rendering (the Streamdown problem): repairing incomplete markdown before parsing, block-level memoization to avoid re-parsing every token, processor caching, and startTransition for smooth streaming."
