id: RB-E-AI-UI
topic: "Generative UI & in-app AI"
category: ai-ui
group: ai
status: drafted
confidence: low
platforms: [react, react-native]
options:
  - { name: "Vercel AI SDK / json-render", tradeoff: "streaming chat + tool-calling; json-render renders model output as components (now RN too)" }
  - { name: "assistant-ui / Tambo", tradeoff: "prebuilt chat/generative-UI components; Tambo 1.0 adds state persistence + streaming, self-host or cloud" }
  - { name: "Cedar / Streamdown", tradeoff: "Cedar = agent-UI toolkit; Streamdown = streaming-markdown renderer for LLM output" }
recommend:
  default: "Vercel AI SDK for streaming chat + tool-calling; assistant-ui/Tambo for prebuilt chat UI; Streamdown to render streaming markdown. Very fast-moving (confidence: low) — treat picks as current-best, not settled."
  when:
    - "render model output as live components → json-render"
    - "agent-style UI → Cedar"
note: >
  Distinct from on-device inference (RB-E-ONDEVICE-AI) — this is cloud-LLM app UI. Very
  fast-moving; recommend tentatively (confidence: low). Adjacent: Vercel's Eve is a file-based agent framework (an agent =
  a folder of tools/connections/channels/schedules; MCP connections, human-approval gates,
  sandboxed subagents) — that's the agent BACKEND you'd then surface through these UI libs,
  not a React UI library itself.
defer_to_skill: null
doc: null
