id: RB-E-A11Y
topic: "Accessibility across web & native"
category: accessibility
group: ui
status: drafted
confidence: medium
platforms: [react, react-native]
options:
  - { name: "semantic roles/labels", tradeoff: "web ARIA vs RN accessibility props" }
  - { name: "focus management", tradeoff: "keyboard (web) vs screen-reader focus (native)" }
recommend:
  default: "Use semantic roles + labels, manage focus order, and announce dynamic updates; test with role-based queries, not data-testid."
  when:
    - "web → ARIA roles + keyboard focus management"
    - "React Native → accessibilityRole/Label + screen-reader focus"
    - "depth audit (contrast, intrinsics, dynamic type) → design-systems-governance"
defer_to_skill: design-systems-governance
doc: null
updated: 2026-06-25
reading:
  - title: "Accessibility in React: Common Mistakes and How to Fix Them"
    url: "https://certificates.dev/blog/accessibility-in-react-common-mistakes-and-how-to-fix-them"
    by: "Aurora Scharff"
    what: "A durable React a11y reference from a recognized expert: semantic HTML, labeling, focus management on route/modal changes, ARIA live regions, with concrete useId/useRef patterns and a WCAG-cited checklist."
  - title: "AI-Generated UI Is Inaccessible by Default"
    url: "https://frontendmasters.com/blog/ai-generated-ui-is-inaccessible-by-default/"
    by: "Frontend Masters"
    what: "Why LLM-generated components ship empty accessibility trees, and a five-layer enforcement system (prompt constraints, jsx-a11y lint, axe-core runtime tests, CI gates, headless primitives). Durable guidance as AI codegen becomes the default."
detect_source:   # source-level signals owned by this entry (regex over repo source)
  - pattern: "accessibilityLabel|accessibilityRole|aria-label|aria-labelledby|<[a-z]+[^>]*\\srole="
    absent: true
    min_stage: "production"
    signal: "no accessibility annotations found anywhere in source (production-stage repo)"
    hint: "screen-reader users get an empty tree — start with roles/labels on interactive elements and role-based test queries (see reading: 'Accessibility in React'); depth → design-systems-governance"
