id: RB-E-STYLING
topic: "Styling & theming"
category: styling
group: ui
status: reviewed   # long-form entry written + source-checked → encyclopedia/RB-E-STYLING.md
confidence: medium
platforms: [react, react-native]
options:
  - { name: "StyleSheet (RN)", tradeoff: "built-in; manual theming" }
  - { name: "NativeWind (v5)", tradeoff: "Tailwind for RN; most-adopted utility approach" }
  - { name: "Unistyles", tradeoff: "C++/Nitro styling engine; fast theming + variants" }
  - { name: "Uniwind", tradeoff: "Tailwind w/ C++ styling engine + animated themes; Pro is paid (~$99/seat/yr)" }
  - { name: "react-native-tailwind", tradeoff: "Babel-plugin / zero-runtime Tailwind — no JS-side styling overhead" }
  - { name: "Tamagui", tradeoff: "cross-platform design-system + optimizing compiler" }
  - { name: "StyleX (0.18, Meta)", tradeoff: "atomic compile-time CSS; sx={} prop; strong web story, RN support emerging" }
  - { name: "styled-components", tradeoff: "largely maintenance (v6.4; v6.3 added RSC support); runtime CSS-in-JS — prefer zero-runtime/StyleX for new web work" }
  - { name: "CSS-in-JS (web)", tradeoff: "runtime cost; prefer zero-runtime variants" }
  - { name: "React Strict DOM", tradeoff: "strict HTML/CSS compiled to static CSS on web + RN styles on native; see RB-E-CROSSPLATFORM" }
recommend:
  default: "Web: Tailwind (pair with shadcn/ui — RB-E-COMPONENT-LIBS). React Native: NativeWind if you want Tailwind, else StyleSheet/Unistyles. Prefer zero-runtime/compiler approaches on both."
  when:
    - "design-system with variants/theming → Tamagui or Unistyles"
    - "Meta-style atomic CSS at scale → StyleX"
    - "web+native shared styling → React Strict DOM (RB-E-CROSSPLATFORM)"
    - "new web CSS-in-JS → avoid runtime libs (styled-components is maintenance); use zero-runtime/StyleX"
note: >
  Web+native: react-native-web is in maintenance mode (2026); React Strict DOM is the
  emerging successor (see RB-E-CROSSPLATFORM). The Tailwind-for-RN field is crowded
  ("Tailwind fatigue" — NativeWind, Uniwind, react-native-tailwind, …); the durable
  selection axis is runtime cost — zero-runtime/compiler approaches avoid JS-side style work.
defer_to_skill: design-systems-governance  # tokens, theme parity, a11y intrinsics
doc: "RB-E-STYLING.md"   # long-form Explanation entry in content_dir
updated: 2026-06-25
reading:
  - title: "Why We're Breaking Up with CSS-in-JS"
    url: "https://www.spotvirtual.com/blog/why-were-breaking-up-with-css-in-js"
    by: "Sam Magura (Emotion maintainer)"
    what: "The canonical runtime-cost argument against runtime CSS-in-JS, from an Emotion maintainer: per-render style serialization is slow (a benchmark shows ~48% faster renders after dropping Emotion). Motivates the move to compile-time / zero-runtime styling."
  - title: "StyleX: A Styling Library for CSS at Scale"
    url: "https://engineering.fb.com/2025/11/11/web/stylex-a-styling-library-for-css-at-scale/"
    by: "Meta Engineering"
    what: "Architecture explainer for the leading zero-runtime approach: a Babel compiler extracts styles into deterministic atomic CSS at build time (no runtime injection), resolving specificity/shorthands at compile time so CSS size stays flat at scale."
  - title: "Moving Linear from styled-components to StyleX"
    url: "https://www.skovhus.dev/blog/moving-linear-from-styled-components-to-stylex"
    by: "Kenneth Skovhus (Linear)"
    what: "First-hand account of a large production CSS-in-JS to StyleX migration: build-time vs runtime styling, ~30% nav improvement, and agent-driven codemods at 100k-line scale. The migration companion to the runtime-cost argument above."
sources:
  - "https://www.spotvirtual.com/blog/why-were-breaking-up-with-css-in-js"
  - "https://engineering.fb.com/2025/11/11/web/stylex-a-styling-library-for-css-at-scale/"
