  - { pkg: "@tailwindcss/*", label: "Tailwind", token: "tailwind" }
  - { pkg: "tailwindcss", label: "Tailwind", token: "tailwind" }
  - { pkg: "nativewind", label: "NativeWind", token: "nativewind" }
  - { pkg: "uniwind", label: "Uniwind", token: "uniwind" }
  - { pkg: "@mgcrea/react-native-tailwind", label: "zero-runtime Tailwind (Babel)", token: "zero-runtime" }
  - { pkg: "react-native-unistyles", label: "Unistyles", token: "unistyles" }
  - { pkg: "@tamagui/*", label: "Tamagui", token: "tamagui" }
  - { pkg: "tamagui", label: "Tamagui", token: "tamagui" }
  - { pkg: "@stylexjs/stylex", label: "StyleX", token: "stylex" }
  - { pkg: "styled-components", label: "styled-components", token: "styled-components" }
  - { pkg: "@emotion/*", label: "Emotion", token: "css-in-js" }
  - { pkg: "linaria", label: "Linaria (frozen by design)", token: "css-in-js" }
  - { pkg: "@linaria/*", label: "Linaria (frozen by design)", token: "css-in-js" }
migrate:   # installed dep → sequenced upgrade knowledge (assembled by `react-brain migrate`)
  - from: { pkg: "react-native-tailwind" }
    to: "@mgcrea/react-native-tailwind (zero-runtime Babel plugin) — or NativeWind/Uniwind per this entry"
    urgency: dead
    effort: S
    why: "the unscoped react-native-tailwind npm package is a dead 2020 artifact; the maintained zero-runtime Babel-plugin package lives under the @mgcrea scope"
    receipts: ["https://registry.npmjs.org/react-native-tailwind"]
