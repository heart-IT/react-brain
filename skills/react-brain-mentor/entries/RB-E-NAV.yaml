id: RB-E-NAV
topic: "Navigation & routing"
category: navigation
group: app-architecture
status: reviewed   # long-form entry written + source-checked → encyclopedia/RB-E-NAV.md
confidence: medium
platforms: [react, react-native]
options:
  - { name: "React Navigation", tradeoff: "RN default; mature; imperative + declarative" }
  - { name: "Expo Router", tradeoff: "file-based; great if on Expo; convention over config; v56 (SDK 56) DECOUPLED from React Navigation — its own native-first core; direct @react-navigation/* imports no longer work alongside it" }
  - { name: "React Router (8.x)", tradeoff: "web routing; absorbed Remix; v8 (8.2.0, 2026-07) RELEASED — ESM-only (drops CJS + react-router-dom), future flags on by default; v7→v8 generally non-breaking if you're caught up on v7 future flags" }
  - { name: "TanStack Router / Start", tradeoff: "type-safe web routing; signal-based core; Start is its RSC/SSR meta-framework (see RB-E-META-FRAMEWORKS)" }
  - { name: "Next.js App Router", tradeoff: "web, full-framework routing + RSC (see RB-E-META-FRAMEWORKS)" }
recommend:
  default: "React Native → Expo Router if you're on Expo, else React Navigation. Web → use the meta-framework's router (see RB-E-META-FRAMEWORKS), or TanStack Router for a type-safe SPA."
  when:
    - "Expo app → Expo Router (file-based)"
    - "bare RN → React Navigation"
    - "type-safe web SPA without a meta-framework → TanStack Router"
    - "web SPA already on React Router, or ecosystem/familiarity over route type-safety → React Router 8 (released, ESM-only; its typegen is framework-mode-only — which is why TanStack keeps the type-safe-SPA slot)"
    - "adopting React Navigation 8 native tabs → still ALPHA in 2026; pin + verify against the RN8 release notes first"
note: >
  React Navigation 8.0 (ALPHA, announced 2025-12) makes NATIVE bottom tabs the default
  (via react-native-screens — native look incl. iOS 26 liquid glass), adds native icon
  components (SFSymbol on iOS / MaterialSymbol on Android — smaller bundles), reworks
  TypeScript inference, and adds screen-history APIs (pushParams, persistor, inactiveBehavior
  via React.Activity). Reflects the trend toward honouring platform UI. Still ALPHA in
  2026 — pin/verify before adopting. Verified vs the React Navigation blog.
  RN8 JULY PROGRESS (2026-07-08, verified vs the React Navigation blog): still PRE-STABLE (next
  tag) — adds Suspense-enabled navigation (interruptible, concurrent), experimental UNSTABLE_loader
  data loaders (TanStack Query/Apollo prefetch), full parent-navigator type inference (drops
  CompositeNavigationProp), and a cross-library STANDARD NAVIGATION API so custom navigators work
  in both React Navigation AND Expo Router — the first bridge across the newly-decoupled stacks.
  Requires screens 4.25+, gesture-handler 3.0+, TS 6+.
  UPDATE 2026-07-09: Expo Router v56 (SDK 56) NO LONGER DEPENDS on React Navigation —
  "expo-router no longer depends on react-navigation"; code importing @react-navigation/*
  directly breaks when adopting it (verified vs the SDK 56 changelog; a codemod exists —
  npx expo-codemod sdk-56-expo-router-react-navigation-replace). The decoupling persists in
  SDK 57 (expo-router 57.x ships zero @react-navigation/* deps, verified vs npm 2026-07-10).
  The Expo-vs-bare split above now separates two DISTINCT navigation stacks, not one wrapper
  over the other — which raises the cost of switching lanes later; weigh it at project setup.
  Stress-tested 2026-07-10 (WEAKENED → React Router when-clause added; the TanStack type-safe-SPA
  slot SURVIVED the 2.3x-downloads attack — RR's typegen is framework-mode-only).
defer_to_skill: null
