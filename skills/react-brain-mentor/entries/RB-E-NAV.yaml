detect_source:   # source-level signals owned by this entry (regex over repo source)
  - pattern: "window\\.location\\.(?:href\\s*=|assign\\()"
    min_files: 2
    signal: "hard navigation via window.location in 2+ files"
    hint: "full-page reloads drop client state and defeat route-level code-splitting — use the router's navigate()/Link for in-app moves; reserve window.location for external URLs"
