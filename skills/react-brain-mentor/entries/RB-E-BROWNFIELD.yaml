id: RB-E-BROWNFIELD
topic: "Brownfield integration & micro-frontends"
category: brownfield
group: platform-native
status: reviewed   # long-form entry written + source-checked
confidence: low
platforms: [react-native]
options:
  - { name: "react-native-brownfield (Callstack)", tradeoff: "embed RN in an existing native app; self-contained iOS init via ReactNativeBrownfield.shared.startReactNative() (wraps RN core's RCTReactNativeFactory)" }
  - { name: "Brownie (@callstack/brownie)", tradeoff: "share native↔JS state for brownfield; generates Swift + Kotlin types from .brownie.ts; iOS + Android; stable (v3.13.x, 2026-06)" }
  - { name: "Granite (Toss)", tradeoff: "micro-frontend: each screen an independently deployable ~200KB bundle on CDN (ESBuild)" }
  - { name: "Rock (Callstack)", tradeoff: "super-apps via micro-frontends + native build caching" }
  - { name: "Expo brownfield (first-party)", tradeoff: "SDK 55+: official Expo path for adding Expo/RN to an existing native app (docs.expo.dev/brownfield; `npx brownfield package:ios` XCFramework flow) — the first-party alternative to the Callstack tooling" }
recommend:
  default: "A scale-stage concern: embed RN into a native app with react-native-brownfield (+ ReactNativeFactory on iOS). For independently-deployable screens / super-apps, look at Granite or Rock."
  when:
    - "add RN screens to an existing native app → react-native-brownfield"
    - "many teams shipping independent bundles → Granite (Toss) / Rock"
note: >
  For embedding RN into native apps or splitting a super-app — a scale-stage concern; mostly
  Callstack/Toss tooling (several alpha) plus, since SDK 55, a first-party Expo path.
  CAPABILITY FLIP (2026-07-10, verified vs the Callstack article body): Expo Updates now works
  in an ISOLATED brownfield architecture with SDK 55 — OTA for embedded RN screens was
  previously a known limitation ("that limitation is a thing of the past"); see RB-E-OTA. The
  same prebuilt-XCFramework flow also cuts hybrid iOS compile times ~39% (Callstack, 2026-07).
defer_to_skill: engineering-principles
doc: "RB-E-BROWNFIELD.md"   # long-form Explanation entry in content_dir
updated: 2026-07-16
sources:
  - "https://github.com/callstack/react-native-brownfield"
  - "https://registry.npmjs.org/@callstack/brownie"
  - "https://docs.expo.dev/brownfield/overview/"
  - "https://www.callstack.com/blog/how-we-made-hybrid-ios-apps-compile-39-faster-with-react-native-brownfield"
reading:
  - title: "Rebuilding the Doctolib Homepage from Webview to Native"
    url: "https://medium.com/doctolib/rebuilding-the-doctolib-homepage-from-webview-to-native-27937ea71801"
    by: "Doctolib"
    what: "Production case study migrating a 115M-hits/month homepage from WebView to native RN with a BFF-driven section architecture (~50% TTI improvement, measurable conversion gains). Durable brownfield-integration lessons."
  - title: "Unlocking Expo Updates in an Isolated Brownfield Architecture with SDK 55"
    url: "https://www.callstack.com/blog/unlocking-expo-updates-in-an-isolated-brownfield-architecture-with-sdk-55"
    by: "Callstack"
    what: "The capability-flip walkthrough behind this entry's note: running EAS/Expo Updates inside an isolated brownfield embed (XCFramework packaging via `npx brownfield package:ios`), which had been a hard limitation of embedded-RN architectures. Read when you need OTA on brownfield screens."
  - title: "React Native production lessons from React Universe Meetup x Zalando"
    url: "https://www.callstack.com/blog/react-native-production-lessons-from-react-universe-meetup-x-zalando"
    by: "Callstack"
    what: "Four hard-won production patterns — brownfield-handoff metrics (Meaningful Render), video-feed jank sequencing, native API bridging, on-device LLM hardware variance. Real-world scale-stage RN guidance."
