id: RB-E-I18N
topic: "Internationalization (i18n)"
category: i18n
group: ui
status: reviewed   # long-form entry written + source-checked
confidence: medium
platforms: [react, react-native]
options:
  - { name: "next-intl (4.x)", tradeoff: "Next.js-first; v4.8 compiles ICU messages AOT to shrink bundles" }
  - { name: "FormatJS / react-intl", tradeoff: "ICU message format; mature, framework-agnostic" }
  - { name: "Lingui (6.x)", tradeoff: "compile-time message extraction; low-boilerplate; i18n directives" }
  - { name: "i18next / react-i18next", tradeoff: "very popular, big plugin ecosystem; works web + RN" }
  - { name: "fbtee", tradeoff: "modern continuation of Meta's deprecated fbt" }
recommend:
  default: "Next.js app → next-intl. Otherwise i18next (web + RN, huge ecosystem) or Lingui (compile-time, low boilerplate)."
  when:
    - "bundle-size-sensitive → next-intl / Lingui (AOT-compiled messages)"
    - "need maximum plugin ecosystem / RN + web parity → i18next"
defer_to_skill: null
doc: "RB-E-I18N.md"   # long-form Explanation entry in content_dir
updated: 2026-07-16
sources:
  - "https://github.com/amannn/next-intl/releases/tag/v4.8.0"
  - "https://github.com/nkzw-tech/fbtee"
reading:
  - title: "Ahead-of-time compilation for next-intl"
    url: "https://next-intl.dev/blog/precompilation"
    by: "Jan Amann (next-intl author)"
    what: "Why and how ICU messages are precompiled at build time into minified ASTs evaluated by a ~650-byte runtime, weighing function-based vs AST strategies against bundle size. Teaches the compile-time-vs-runtime and bundle-size tradeoffs from first principles."
    claim: "You ship next-intl — v4.8 precompiles ICU messages at build time into minified ASTs evaluated by a ~650-byte runtime, trading runtime message parsing for smaller bundles."
    applies_when: { deps: ["next-intl"] }
  - title: "ICU Message Syntax (core concepts)"
    url: "https://formatjs.github.io/docs/core-concepts/icu-syntax/"
    by: "FormatJS (react-intl)"
    what: "The canonical, example-driven explanation of the ICU message format — interpolation, plurals/selectordinal, select, number/date skeletons, rich text. ICU is a stable Unicode standard, so this foundational reference doesn't go stale."
    claim: "You ship an ICU-based i18n layer (react-intl/next-intl/Lingui) — your message strings are ICU syntax (interpolation, plurals/selectordinal, select, number/date skeletons); ICU is a stable Unicode standard, so this reference doesn't go stale."
    applies_when: { deps: ["react-intl", "next-intl", "@lingui/*"] }
detect_source:   # source-level signals owned by this entry (regex over repo source)
  - pattern: "useTranslation|i18next|formatMessage|react-intl|getLocales|lingui|next-intl|fbtee"
    absent: true
    min_stage: "production"
    signal: "no i18n layer found anywhere in source (production-stage repo)"
    hint: "if localization is ever on the roadmap, retrofitting hardcoded strings is the expensive path — wire the message layer early (i18next for web+RN reach, Lingui/next-intl for AOT-compiled bundles)"
detect:   # package.json dep → this entry (pkg: exact | @scope/* | name*; token matched against recommend text)
  - { pkg: "next-intl", label: "next-intl", token: "next-intl" }
  - { pkg: "react-i18next", label: "react-i18next", token: "i18next" }
  - { pkg: "i18next", label: "i18next", token: "i18next" }
  - { pkg: "react-intl", label: "react-intl", token: "formatjs" }
  - { pkg: "@lingui/*", label: "Lingui", token: "lingui" }
