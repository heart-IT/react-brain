  - { pkg: "@gorhom/bottom-sheet", label: "gorhom bottom-sheet", token: "gorhom" }
  - { pkg: "@swmansion/react-native-bottom-sheet", label: "SWM native bottom-sheet (0.x)", token: "swmansion" }
