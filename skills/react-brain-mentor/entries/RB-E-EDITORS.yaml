id: RB-E-EDITORS
topic: "Rich-text & content editors"
category: editors
group: ui
status: drafted
confidence: low
platforms: [react]
options:
  - { name: "TipTap", tradeoff: "headless editor on ProseMirror with first-class React bindings; rich extension ecosystem; the common React default" }
  - { name: "ProseMirror", tradeoff: "the powerful low-level toolkit (document model, transforms, plugins); max control, steeper curve; underpins TipTap/BlockNote" }
  - { name: "Lexical (Meta)", tradeoff: "extensible, performance-focused editor framework from Meta; strong for large docs + custom nodes" }
  - { name: "Slate / Plate", tradeoff: "React-first customizable framework (Slate); Plate adds a batteries-included plugin system on top" }
  - { name: "BlockNote", tradeoff: "Notion-style block editor on ProseMirror/TipTap; fast to adopt for block-based UX" }
recommend:
  default: "Most React apps → TipTap (ProseMirror power with React ergonomics); large-scale / custom-node-heavy → Lexical; maximum control → ProseMirror directly; deeply custom React schemas → Slate/Plate; Notion-style blocks → BlockNote. Lightly vetted (confidence: low) — prototype against your real document model before committing."
  when:
    - "standard rich text with extensions → TipTap"
    - "Meta-scale performance / custom nodes → Lexical"
    - "block-based (Notion-like) UX → BlockNote"
    - "full control of the editing pipeline → ProseMirror"
note: "NEW entry (2026-06-25): rich-text/content editing is a common, hard React need with real library choices and was previously uncovered. Most React editors build on ProseMirror (TipTap, BlockNote) or stand alone (Lexical, Slate). Lightly vetted (confidence: low) — prototype before committing."
defer_to_skill: null
doc: null
updated: 2026-06-25
reading:
  - title: "The Unreasonable Effectiveness of the ProseMirror Model in Rich Text Transformation"
    url: "https://smoores.dev/post/unreasonable_effectiveness_of_prosemirror/"
    by: "Shane Friedman (Storyteller)"
    what: "Teaches ProseMirror's core abstractions (nodes, marks, positions, mappings) through a real parse→transform→serialize pipeline. Durable conceptual grounding for the document model under most React editors."
