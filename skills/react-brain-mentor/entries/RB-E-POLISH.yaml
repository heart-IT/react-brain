  - { pkg: "react-native-haptic-feedback", label: "haptic-feedback", token: "react-native-haptic-feedback" }
  - { pkg: "react-native-bootsplash", label: "bootsplash", token: "bootsplash" }
  - { pkg: "expo-splash-screen", label: "expo-splash-screen", token: "expo-splash-screen" }
  - { pkg: "@nandorojo/galeria", label: "galeria (lightbox)", token: "galeria" }
  - { pkg: "react-native-image-viewing", label: "image-viewing (dormant)", token: "image-viewing" }
