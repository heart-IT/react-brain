# ══════════════════════════════════════════════════════════════
# REACT-BRAIN ENCYCLOPEDIA — INDEX
# ══════════════════════════════════════════════════════════════
# react-brain is a React-ecosystem ENCYCLOPEDIA: curated knowledge about the
# React + React Native world — which libraries, which patterns, the tradeoffs,
# and what to use when. This file is the machine-readable INDEX the mentor skill
# reads to give breadth/selection advice (MP-VETTED-OVER-PROMOTION).
#
# SOURCES: facts are synthesized from 4 cross-checked newsletters (React Native
# Rewind, This Week in React, React Status, React Digest) as of 2026-06-25;
# load-bearing version/security facts are verified against primary sources
# (entries with `sources:` + `updated:`). Library picks in `recommend` are
# editorial synthesis, not vendor claims.
#
# STATE (2026-07-06): 37 entries across 6 groups, ALL `drafted`+ (0 stubs) — breadth is fully
# citable. 14 are `reviewed` with long-form encyclopedia/<id>.md. Every entry carries curated,
# fetch-verified `reading`. Reachability: cross-cutting domains via the mentor's
# assessment_dimensions; feature/capability domains via the mentor's `capability_map`.
#
# SCOPE BOUNDARY (no duplication with the depth knowledge skills):
#   Encyclopedia = BREADTH (ecosystem SELECTION + cross-cutting choices).
#   It does NOT re-encode DEPTH rules owned by a knowledge skill (RN perf →
#   react-native-best-practices; architecture → engineering-principles; a11y/
#   tokens → design-systems-governance; JSI → react-native-jsi). Each entry names
#   a `defer_to_skill` for depth instead of restating its rules.
#
# HOW THE MENTOR USES THIS:
#   1. Read `groups` to jump to the relevant area (don't scan all entries).
#   2. For an in-scope topic, read that entry's `recommend.default` + `recommend.when`,
#      match the project's context, and cite the entry id.
#   3. Only recommend a swap if the entry status is `drafted`/`reviewed` AND the
#      project's choice loses on a stated axis (see mentor MP-VETTED-OVER-PROMOTION).
#
# status ladder:
#   stub      — options listed but recommendation is a lead only. Mentor flags as unsettled.
#   drafted   — written + internally consistent recommendation. Mentor MAY cite.
#   reviewed  — recommendation checked against primary sources + dated. Mentor cites freely.
#   stale     — was reviewed but the ecosystem moved on; needs refresh.
#
# confidence (orthogonal to status): high | medium | low — how settled the pick is.
#
# Each entry:
#   id, topic, category, group           — identity + taxonomy (group ∈ `groups`)
#   status, confidence                    — see ladders above
#   platforms      — [react] | [react-native] | [react, react-native]
#   options        — credible choices (name + one-line tradeoff)
#   recommend      — default: the pick · when: [context → choice (why)]   ← the payload
#   note           — verified facts / caveats (sourced where it matters)
#   defer_to_skill — the depth skill that owns in-domain rules here
#   reading        — curated, annotated deep-dive ARTICLES for the topic (title/url/by/what).
#                    This is how good writing surfaced in the newsletters is kept, not dropped:
#                    a canonical article lives in the relevant entry's `reading`; an article with
#                    no home has revealed a GAP → add the entry. Pure how-to depth still routes to
#                    `defer_to_skill`, not here.
#   sources, updated, doc
# ══════════════════════════════════════════════════════════════

encyclopedia:
  name: react-brain
  one_liner: "A curated encyclopedia of the React + React Native ecosystem — what to use, when, and why."
  content_dir: "../../encyclopedia"   # long-form entries land here as markdown, named <id>.md
  authoring_guide: "diataxis-documentation"
  updated: 2026-07-06
  sources_digested: ["React Native Rewind ×47", "This Week in React ×22", "React Status ×22", "React Digest ×16"]

