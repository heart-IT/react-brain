# ══════════════════════════════════════════════════════════════
# REACT-BRAIN ENCYCLOPEDIA — INDEX
# ══════════════════════════════════════════════════════════════
# react-brain is a React-ecosystem ENCYCLOPEDIA: curated knowledge about the
# React + React Native world — which libraries, which patterns, the tradeoffs,
# and what to use when. This file is the machine-readable INDEX the mentor skill
# reads to give breadth/selection advice (MP-VETTED-OVER-PROMOTION).
#
# SOURCES: facts are synthesized from 6 cross-checked newsletters (React Native
# Rewind, This Week in React, React Status, React Digest, Native Weekly, React
# Weekly) as of 2026-07-10; load-bearing version/security facts are verified against primary
# sources (entries with `sources:` + `updated:`). Library picks in `recommend`
# are editorial synthesis, not vendor claims.
#
# STATE (2026-07-09): 42 entries across 6 groups, ALL `drafted`+ (0 stubs) — breadth is fully
# citable. 19 are `reviewed` with long-form encyclopedia/<id>.md. Every entry carries curated,
# fetch-verified `reading`. Reachability: cross-cutting domains via the mentor's
# assessment_dimensions; feature/capability domains via the mentor's `capability_map`.
#
# SCOPE BOUNDARY (no duplication with the depth knowledge skills):
#   Encyclopedia = BREADTH (ecosystem SELECTION + cross-cutting choices).
#   It does NOT re-encode DEPTH rules owned by a knowledge skill (RN perf →
#   react-native-best-practices; architecture → engineering-principles; a11y/
#   tokens → design-systems-governance; JSI → react-native-jsi). Each entry names
#   a `defer_to_skill` for depth instead of restating its rules.
#
# HOW THE MENTOR USES THIS:
#   1. Read `groups` to jump to the relevant area (don't scan all entries).
#   2. For an in-scope topic, read that entry's `recommend.default` + `recommend.when`,
#      match the project's context, and cite the entry id.
#   3. Only recommend a swap if the entry status is `drafted`/`reviewed` AND the
#      project's choice loses on a stated axis (see mentor MP-VETTED-OVER-PROMOTION).
#
# status ladder:
#   stub      — options listed but recommendation is a lead only. Mentor flags as unsettled.
#   drafted   — written + internally consistent recommendation. Mentor MAY cite.
#   reviewed  — recommendation checked against primary sources + dated. Mentor cites freely.
#   stale     — was reviewed but the ecosystem moved on; needs refresh.
#
# confidence (orthogonal to status): high | medium | low — how settled the pick is.
#
# Each entry:
#   id, topic, category, group           — identity + taxonomy (group ∈ `groups`)
#   status, confidence                    — see ladders above
#   platforms      — [react] | [react-native] | [react, react-native]
#   options        — credible choices (name + one-line tradeoff)
#   recommend      — default: the pick · when: [context → choice (why)]   ← the payload
#   note           — verified facts / caveats (sourced where it matters)
#   defer_to_skill — the depth skill that owns in-domain rules here
#   reading        — curated, annotated deep-dive ARTICLES for the topic (title/url/by/what).
#                    This is how good writing surfaced in the newsletters is kept, not dropped:
#                    a canonical article lives in the relevant entry's `reading`; an article with
#                    no home has revealed a GAP → add the entry. Pure how-to depth still routes to
#                    `defer_to_skill`, not here.
#   watching       — OPTIONAL curated A/V (talks, podcasts, videos; same title/url/by/what shape;
#                    added 2026-07-09). The A/V companion to `reading` — newsletters surface strong
#                    podcasts/talks the text-only policy used to drop. Verification bar: confirm the
#                    item exists (episode/video page fetch) + its claims corroborate corpus facts;
#                    we cannot watch it, so annotate from the verified page, never invent content.
#   detect         — package.json signals owned by THIS entry: [{pkg, label, token}]
#                    (pkg: exact name | '@scope/*' | 'name*'). tools/detect.mjs assembles
#                    these into the detection table — adding an entry never touches tools.
#   sources, updated, doc
# ══════════════════════════════════════════════════════════════

encyclopedia:
  name: react-brain
  one_liner: "A curated encyclopedia of the React + React Native ecosystem — what to use, when, and why."
  content_dir: "../../encyclopedia"   # long-form entries land here as markdown, named <id>.md
  authoring_guide: "diataxis-documentation"
  updated: 2026-07-13
  sources_digested: ["React Native Rewind ×48", "This Week in React ×23", "React Status ×23", "React Digest ×17", "Native Weekly ×6", "React Weekly ×21"]

# ------------------------------------------------------------------------------
# GROUPS — table of contents. The mentor navigates by group, not by scanning all.
# ------------------------------------------------------------------------------
groups:
  - id: react-foundations
    label: "React & language foundations"
    entries: [RB-E-REACT-CORE, RB-E-RN-VERSIONS, RB-E-TYPESCRIPT]
  - id: app-architecture
    label: "App architecture — state, data, routing, frameworks"
    entries: [RB-E-STATE, RB-E-DATA, RB-E-P2P, RB-E-NAV, RB-E-META-FRAMEWORKS, RB-E-FORMS, RB-E-NETWORKING, RB-E-CROSSPLATFORM, RB-E-DESKTOP]
  - id: ui
    label: "UI — styling, components, animation, lists, a11y, i18n, charts"
    entries: [RB-E-STYLING, RB-E-COMPONENT-LIBS, RB-E-ANIMATION, RB-E-LISTS, RB-E-A11Y, RB-E-I18N, RB-E-CHARTS, RB-E-EDITORS, RB-E-SVG, RB-E-MAPS, RB-E-CALENDARS, RB-E-POLISH]
  - id: platform-native
    label: "Platform & native (RN)"
    entries: [RB-E-NATIVE, RB-E-MEDIA, RB-E-STORAGE, RB-E-NATIVE-UI, RB-E-KEYBOARD, RB-E-PAYMENTS, RB-E-BROWNFIELD, RB-E-GAMES, RB-E-ALT-FRAMEWORKS]
  - id: tooling-ops
    label: "Build, test, observe, secure"
    entries: [RB-E-BUILD, RB-E-TESTING, RB-E-DX, RB-E-OBSERVABILITY, RB-E-SECURITY, RB-E-OTA]
  - id: ai
    label: "AI in React apps"
    entries: [RB-E-ONDEVICE-AI, RB-E-AI-UI, RB-E-AI-DEVTOOLS]

# ==============================================================================
# ENTRIES — one file per entry in entries/<ID>.yaml (split 2026-07-06 for
# reviewable diffs and partial reads; comments preserved). Loaded and ordered by
# the `groups` TOC above via tools/detect.mjs loadDoc(). To ADD an entry: write
# entries/<ID>.yaml + add its id to a group above (+ optional `detect:` rows).
# `react-brain lint` enforces the invariants.
# ==============================================================================

# ------------------------------------------------------------------------------
# MENTOR HINTS — framing the mentor may use even before entries are written.
# ------------------------------------------------------------------------------
mentor_hints:
  - "An entry at `stub` status means 'we have not yet vetted this' — the recommend.default is a LEAD; the mentor says so rather than presenting it as settled."
  - "Recommendations are CONTEXT-KEYED: read recommend.when, match the project, and cite the entry id. recommend.default is the no-context starting point."
  - "When the project's choice already matches the entry's recommendation for its context, that's a STRENGTH to name, not a change to push."
  - "The encyclopedia is breadth; for depth in a domain the entry names a `defer_to_skill` — the mentor routes there, not into a restatement."
  - "A commonly-cited 2026 React-WEB default stack (React Digest, 'My frontend stack in 2026'): Vite + pnpm + TypeScript + Tailwind + Zustand + TanStack Query + Zod + Vitest + Playwright + Sentry (plus Oxlint/Oxfmt, MSW, Storybook). Use as a sanity-check baseline, not a mandate — still context-key it."
  - "`confidence: low` entries are fast-moving/niche — recommend tentatively and tell the user to prototype; `high` entries are safe to recommend directly."
  - "Articles matter, not just version facts. A strong deep-dive is captured in the relevant entry's `reading` list (annotated). If an article has no entry to live in, it has revealed a GAP — add the entry (RB-E-MEDIA came from a real-time-filters deep-dive). The mentor may surface a `reading` link when a project is doing exactly what the article covers. Pure how-to depth still routes to `defer_to_skill`, not the index."
  - "`watching` (optional) is the A/V companion to `reading` — talks/podcasts/videos. Like reading, it belongs in the learning-path section of a report, never in the recommend decision."
